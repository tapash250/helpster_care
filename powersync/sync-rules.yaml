# PowerSync sync rules for Helpster Care.
# Protected file (AGENTS.md §11). Defines what data is replicated to local
# offline replicas. Large binary files are NOT synced — only metadata (§55).
#
# Buckets scope rows to the authenticated user's authorization (RBAC + ReBAC).
# The server (RLS) remains the source of truth; these rules are an optimization
# layer, never a security boundary.

bucket_definitions:
  # Global lookup / reference data (roles, permissions, statuses, categories).
  global_reference:
    data:
      - SELECT * FROM roles
      - SELECT * FROM permissions
      - SELECT * FROM role_permissions
      - SELECT * FROM patient_status
      - SELECT * FROM treatment_type
      - SELECT * FROM document_categories
      - SELECT * FROM workflow_states
      - SELECT * FROM workflow_transitions
      - SELECT * FROM hospital_type

  # User-scoped identity & authorization.
  user_identity:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM user_roles WHERE user_id = bucket.user_id
      - SELECT * FROM hospital_assignments WHERE user_id = bucket.user_id
      - SELECT * FROM patient_assignments WHERE user_id = bucket.user_id

  # Hospitals the user is assigned to.
  assigned_hospitals:
    parameters: >-
      SELECT hospital_id FROM hospital_assignments
      WHERE user_id = request.user_id() AND is_active
    data:
      - SELECT * FROM hospitals WHERE id = bucket.hospital_id
      - SELECT * FROM departments WHERE hospital_id = bucket.hospital_id
      - SELECT * FROM wards WHERE hospital_id = bucket.hospital_id
      - SELECT * FROM beds WHERE ward_id IN (SELECT id FROM wards WHERE hospital_id = bucket.hospital_id)
      - SELECT * FROM operating_theatres WHERE hospital_id = bucket.hospital_id

  # Patients the user may access (via hospital / patient assignment).
  assigned_patients:
    parameters: >-
      SELECT patient_id FROM patient_assignments
      WHERE user_id = request.user_id() AND is_active
      UNION
      SELECT id AS patient_id FROM patients
      WHERE hospital_id IN (
        SELECT hospital_id FROM hospital_assignments
        WHERE user_id = request.user_id() AND is_active
      )
    data:
      - SELECT * FROM patients WHERE id = bucket.patient_id
      - SELECT * FROM patient_contacts WHERE patient_id = bucket.patient_id
      - SELECT * FROM patient_addresses WHERE patient_id = bucket.patient_id
      - SELECT * FROM patient_guardians WHERE patient_id = bucket.patient_id
      - SELECT * FROM patient_status_history WHERE patient_id = bucket.patient_id
      - SELECT * FROM patient_notes WHERE patient_id = bucket.patient_id
      - SELECT * FROM treatments WHERE patient_id = bucket.patient_id
      - SELECT * FROM diagnoses WHERE patient_id = bucket.patient_id
      - SELECT * FROM prescriptions WHERE patient_id = bucket.patient_id
      - SELECT * FROM conservative_treatments WHERE patient_id = bucket.patient_id
      - SELECT * FROM surgical_treatments WHERE patient_id = bucket.patient_id
      - SELECT * FROM surgeries WHERE patient_id = bucket.patient_id
      - SELECT * FROM ot_schedules WHERE patient_id = bucket.patient_id
      - SELECT * FROM followups WHERE patient_id = bucket.patient_id
      - SELECT * FROM activity_timeline WHERE patient_id = bucket.patient_id
      - SELECT * FROM approvals WHERE patient_id = bucket.patient_id
      # Document METADATA only — binary files stay in Storage, downloaded on demand.
      - SELECT id, patient_id, category_id, title, description, storage_path, checksum, size_bytes, mime_type, is_verified, created_at, updated_at FROM documents WHERE patient_id = bucket.patient_id AND is_deleted = false

  # Notifications the user is authorized to view.
  user_notifications:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM notifications WHERE recipient_id = bucket.user_id

  # Dashboard caches for the user.
  user_dashboard_cache:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM dashboard_cache WHERE user_id = bucket.user_id
