name: helpster_care
description: >-
  Helpster Care — an enterprise-grade, offline-first patient case management
  platform for humanitarian and charitable healthcare organizations.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / Design
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  syncfusion_flutter_charts: ^27.1.48

  # State management (Riverpod 3 only — see AGENTS.md §23)
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^3.0.0

  # Navigation (Go Router only — see AGENTS.md §28)
  go_router: ^14.2.7

  # Data modelling
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local persistence & offline sync
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  powersync: ^1.9.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Backend
  supabase_flutter: ^2.6.0

  # Security
  flutter_secure_storage: ^9.2.2

  # Media capture / files
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Utilities
  intl: ^0.19.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.0
  drift_dev: ^2.20.3
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
  fonts: []
