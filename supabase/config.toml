# Supabase project configuration for Helpster Care.
# Protected file (AGENTS.md §11) — change only with architectural justification.

project_id = "helpster_care"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# Private buckets for Protected Health Information — never public (§49, §79).
[[storage.buckets.patients]]
public = false
[[storage.buckets.hospital_documents]]
public = false
[[storage.buckets.reports]]
public = false
[[storage.buckets.exports]]
public = false
[[storage.buckets.avatars]]
public = false
[[storage.buckets.system]]
public = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false
enable_confirmations = true

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

[edge_runtime]
enabled = true

[analytics]
enabled = false
